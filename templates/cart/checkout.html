{% extends 'base.html' %}

{% block content %}

<section class="section-content padding-y bg">
<div class="container">

<div class="row">

  <!-- Billing Address -->
  <aside class="col-lg-6">
    <div class="card">
      <div class="card-body">
        <h4 class="card-title mb-4">Billing Address</h4>

        <form action="{% url 'place_order' %}" method="POST">
          {% csrf_token %}
          <div class="form-row">
            <div class="col form-group">
              <label>First Name</label>
              <input type="text" name="first_name" class="form-control" required>
            </div>
            <div class="col form-group">
              <label>Last Name</label>
              <input type="text" name="last_name" class="form-control" required>
            </div>
          </div>

          <div class="form-row">
            <div class="col form-group">
              <label>Email</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="col form-group">
              <label>Phone Number</label>
              <input type="text" name="phone" class="form-control" required>
            </div>
          </div>

          <div class="form-row">
            <div class="col form-group">
              <label>Address Line 1</label>
              <input type="text" name="address_line_1" class="form-control" required>
            </div>
            <div class="col form-group">
              <label>Address Line 2</label>
              <input type="text" name="address_line_2" class="form-control">
            </div>
          </div>

          <div class="form-row">
            <div class="col form-group">
              <label>City</label>
              <input type="text" name="city" class="form-control" required>
            </div>
            <div class="col form-group">
              <label>State</label>
              <input type="text" name="state" class="form-control" required>
            </div>
            <div class="col form-group">
              <label>Country</label>
              <input type="text" name="country" class="form-control" required>
            </div>
          </div>

          <div class="form-row">
            <label>Order Note</label>
            <textarea name="order_note" rows="2" class="form-control"></textarea>
          </div>

      </div>
    </div>
  </aside>


  <!-- Order Summary -->
  <aside class="col-lg-6">

    <div class="card">
      <div class="card-body">

        <table class="table table-borderless table-shopping-cart">
          <thead class="text-muted">
            <tr class="small text-uppercase">
              <th>Product</th>
              <th width="120">Quantity</th>
              <th width="120">Price</th>
            </tr>
          </thead>

          <tbody>

            <!-- Example Static Item -->
            {% for cart_item in cart_items %}
            <tr>
              <td>
                <figure class="itemside align-items-center">
                  <div class="aside">
                    <img src="{{ cart_item.product.images.url }}" class="img-sm">
                  </div>
                  <figcaption class="info">
                    <a href="#" class="title text-dark">{{ cart_item.product.product_name }}</a>
                    <p class="text-muted small">
                        {% for variation in cart_item.variation.all %}
                          <strong>{{ variation.variation_category }}:</strong> {{ variation.variation_value }}<br>
                        {% endfor %}
                    </p>
                  </figcaption>
                </figure>
              </td>

              <td>
                <label>{{ cart_item.quantity }}</label>
              </td>

              <td>
                <div class="price-wrap">
                  <var class="price">${{ cart_item.product_total }}</var>
                  <small class="text-muted">${{ cart_item.product.price }} each</small>
                </div>
              </td>    
            </tr>
            {% endfor %}
          </tbody>
        </table>

        <button type="submit" class="btn btn-primary btn-block">
          Place Order
        </button>

        <a href="{% url 'view_products' %}" class="btn btn-light btn-block">
          Continue Shopping
        </a>

        </form>

      </div>
    </div>

  </aside>

</div>

</div>
</section>

{% endblock %}
